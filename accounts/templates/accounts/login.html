<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion | Extranet Affectation</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f3f6f8;
            color: #17202a;
        }

        main {
            width: min(420px, calc(100% - 32px));
            padding: 28px;
            background: #fff;
            border: 1px solid #d8e0e6;
            border-radius: 8px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }

        p {
            margin: 0 0 24px;
            color: #5d6d7e;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
            padding: 10px 12px;
            border: 1px solid #b8c4cc;
            border-radius: 6px;
            font: inherit;
        }

        button {
            width: 100%;
            padding: 11px 14px;
            border: 0;
            border-radius: 6px;
            background: #0f766e;
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .error {
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 6px;
            background: #fdecec;
            color: #922b21;
        }
    </style>
</head>
<body>
    <main>
        <h1>Connexion Extranet</h1>
        <p>Acces reserve aux administrations beneficiaires.</p>

        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors|join:" " }}</div>
        {% elif form.errors %}
            <div class="error">Identifiant ou mot de passe incorrect.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <label for="{{ form.username.id_for_label }}">Identifiant</label>
            {{ form.username }}

            <label for="{{ form.password.id_for_label }}">Mot de passe</label>
            {{ form.password }}

            <button type="submit">Se connecter</button>
        </form>
    </main>
</body>
</html>
